<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JigMerge</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="game.css">
</head>

<body>
    <div id="game-container">
        <!-- Main Menu -->
        <div id="main-menu" class="screen active">
            <!-- Floating puzzle decorations -->
            <div class="menu-float-tile" style="width:48px;height:40px;">
                <svg viewBox="0 0 60 50" fill="rgba(244,162,89,0.12)" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M10 0 L30 0 C30 0 28 8 35 8 C42 8 40 0 40 0 L60 0 L60 20 C60 20 52 18 52 25 C52 32 60 30 60 30 L60 50 L40 50 C40 50 42 42 35 42 C28 42 30 50 30 50 L10 50 L10 30 C10 30 18 32 18 25 C18 18 10 20 10 20 Z"
                        stroke="rgba(244,162,89,0.18)" stroke-width="1" />
                </svg>
            </div>
            <div class="menu-float-tile" style="width:42px;height:35px;">
                <svg viewBox="0 0 60 50" fill="rgba(251,133,0,0.10)" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M10 0 L30 0 C30 0 28 8 35 8 C42 8 40 0 40 0 L60 0 L60 20 C60 20 52 18 52 25 C52 32 60 30 60 30 L60 50 L40 50 C40 50 42 42 35 42 C28 42 30 50 30 50 L10 50 L10 30 C10 30 18 32 18 25 C18 18 10 20 10 20 Z"
                        stroke="rgba(251,133,0,0.15)" stroke-width="1" />
                </svg>
            </div>
            <div class="menu-float-tile" style="width:52px;height:43px;">
                <svg viewBox="0 0 60 50" fill="rgba(255,204,0,0.15)" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M10 0 L30 0 C30 0 28 8 35 8 C42 8 40 0 40 0 L60 0 L60 20 C60 20 52 18 52 25 C52 32 60 30 60 30 L60 50 L40 50 C40 50 42 42 35 42 C28 42 30 50 30 50 L10 50 L10 30 C10 30 18 32 18 25 C18 18 10 20 10 20 Z"
                        stroke="rgba(255,204,0,0.2)" stroke-width="1" />
                </svg>
            </div>
            <div class="menu-float-tile" style="width:38px;height:32px;">
                <svg viewBox="0 0 60 50" fill="rgba(244,162,89,0.09)" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M10 0 L30 0 C30 0 28 8 35 8 C42 8 40 0 40 0 L60 0 L60 20 C60 20 52 18 52 25 C52 32 60 30 60 30 L60 50 L40 50 C40 50 42 42 35 42 C28 42 30 50 30 50 L10 50 L10 30 C10 30 18 32 18 25 C18 18 10 20 10 20 Z"
                        stroke="rgba(244,162,89,0.14)" stroke-width="1" />
                </svg>
            </div>
            <div class="menu-float-tile" style="width:44px;height:37px;">
                <svg viewBox="0 0 60 50" fill="rgba(251,133,0,0.08)" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M10 0 L30 0 C30 0 28 8 35 8 C42 8 40 0 40 0 L60 0 L60 20 C60 20 52 18 52 25 C52 32 60 30 60 30 L60 50 L40 50 C40 50 42 42 35 42 C28 42 30 50 30 50 L10 50 L10 30 C10 30 18 32 18 25 C18 18 10 20 10 20 Z"
                        stroke="rgba(251,133,0,0.12)" stroke-width="1" />
                </svg>
            </div>
            <div class="menu-float-tile" style="width:36px;height:30px;">
                <svg viewBox="0 0 60 50" fill="rgba(255,204,0,0.12)" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M10 0 L30 0 C30 0 28 8 35 8 C42 8 40 0 40 0 L60 0 L60 20 C60 20 52 18 52 25 C52 32 60 30 60 30 L60 50 L40 50 C40 50 42 42 35 42 C28 42 30 50 30 50 L10 50 L10 30 C10 30 18 32 18 25 C18 18 10 20 10 20 Z"
                        stroke="rgba(255,204,0,0.18)" stroke-width="1" />
                </svg>
            </div>

            <div class="menu-header">
                <div class="menu-economy-bar">
                    <div class="coin-badge">
                        <span class="coin-icon">
                            <svg class="icon-svg star-icon" viewBox="0 0 24 24" fill="var(--yellow-star)"
                                stroke="var(--wood-dark)" stroke-width="1.5" stroke-linejoin="round">
                                <polygon
                                    points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                                </polygon>
                            </svg>
                        </span>
                        <span id="coin-amount">0</span>
                    </div>
                    <button id="open-shop" class="wood-btn small">Shop</button>
                </div>
                <div class="game-logo game-title">JigMerge</div>
                <div class="game-tagline">Jig puzzle meets solitaire</div>
                <button id="sound-toggle-menu" class="wood-btn icon small" aria-label="Toggle sound">
                    <svg id="sound-icon-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    </svg>
                </button>
                <div class="volume-slider-container">
                    <input type="range" id="volume-slider-menu" min="0" max="1" step="0.01" value="0.25">
                </div>
            </div>

            <div class="menu-center">
                <div class="menu-graphic"></div>
                <button id="start-btn" class="wood-btn large">PLAY</button>
            </div>

            <div class="menu-bottom">
                <button class="wood-btn small active" id="home-btn">HOME</button>
                <button id="settings-btn" class="wood-btn small icon">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                        </path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Shop Overlay -->
        <div id="shop-overlay" class="hidden fullscreen-overlay">
            <div class="shop-card wood-panel">
                <div class="shop-header">
                    <h2 class="wood-text">SHOP</h2>
                    <button id="close-shop-btn" class="wood-btn small icon">×</button>
                </div>
                <p class="sidebar-hint" style="text-align:center;">Spend your coins on new skins & cosmetics.</p>
                <div id="shop-grid" class="shop-grid">
                    <div class="shop-placeholder">Coming soon</div>
                </div>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="settings-overlay" class="hidden fullscreen-overlay">
            <div class="modal-content">
                <h2 class="wood-text">SETTINGS</h2>
                <div class="settings-options" style="margin: 12px 0;">
                    <button id="toggle-sound-btn" class="wood-btn small">SOUND: ON</button>
                </div>
                <button id="close-settings-btn" class="wood-btn small">CLOSE</button>
            </div>
        </div>

        <!-- Level Select Screen -->
        <div id="level-select-screen" class="hidden">
            <div class="menu-top">
                <button id="back-to-main-btn" class="wood-btn small icon">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>
                <div class="level-header-titles">
                    <h2 class="wood-text" id="level-screen-title" style="font-size: 24px;">LEVELS</h2>
                    <p class="sidebar-hint" id="level-screen-subtitle" style="display:none;">Select a puzzle</p>
                </div>
            </div>

            <!-- View 1: Level Categories (Sizes) -->
            <div class="level-grid" id="category-grid">
                <!-- Level Category buttons injected by JS -->
            </div>

            <!-- View 2: Puzzles inside a specific Level -->
            <div class="level-grid hidden" id="puzzle-grid">
                <!-- Puzzle buttons injected by JS -->
            </div>
        </div>

        <!-- Top UI Bar for Game Board -->
        <header id="game-header" class="hidden game-toolbar">
            <div class="header-left">
                <button id="pause-btn" class="wood-btn icon small game-back-btn" aria-label="Back to levels">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <path d="M11 14L6 9L11 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <span style="display:none">Levels</span>
                </button>
                <div id="game-level-title" class="game-level-title">Level 1</div>
            </div>
            <div class="header-center game-stat-row">
                <span class="gstat-pill wood-panel-small">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                        <path d="M6 1l1.4 2.8 3.1.45-2.25 2.2.53 3.1L6 8.1l-2.78 1.45.53-3.1L1.5 4.25l3.1-.45z"
                            fill="currentColor" />
                    </svg>
                    <span id="move-count">0</span> moves
                </span>
                <span class="gstat-sep"></span>
                <span class="gstat-pill wood-panel-small">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                        <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.2" />
                        <path d="M6 3.5V6l1.5 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
                    </svg>
                    <span id="timer-display">0:00</span>
                </span>
            </div>
            <div class="header-right game-toolbar-right">
                <span class="coin-inline toolbar-coins wood-panel-small">
                    <span class="coin-icon">
                        <svg class="icon-svg star-icon" viewBox="0 0 24 24" fill="var(--yellow-star)"
                            stroke="var(--wood-dark)" stroke-width="1.5" stroke-linejoin="round"
                            style="width:14px;height:14px;">
                            <polygon
                                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                            </polygon>
                        </svg>
                    </span>
                    <span id="coins-total-game">0</span>
                </span>
                <button id="sound-toggle-game" class="wood-btn icon small sound-toggle" aria-label="Toggle sound">
                    <svg id="sound-icon-game" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Game Area (Board + Sidebar) -->
        <div id="game-area" class="hidden">
            <!-- Main Board -->
            <div class="board-wrap">
                <main id="board">
                    <!-- Puzzle pieces will be injected here -->
                </main>
            </div>

            <!-- Reference Image Sidebar -->
            <aside id="game-sidebar">
                <div class="sidebar-section">
                    <h3 class="sidebar-label">
                        <svg width="11" height="11" viewBox="0 0 11 11" fill="none" style="margin-right:4px;">
                            <rect x="1" y="1" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.2" />
                            <path d="M3.5 3.5h4M3.5 5.5h4M3.5 7.5h2" stroke="currentColor" stroke-width="1.2"
                                stroke-linecap="round" />
                        </svg>
                        Reference
                    </h3>
                    <div id="ref-image" class="ref-image-box"></div>
                </div>

                <hr class="sidebar-divider" style="opacity: 0.1">

                <div class="sidebar-section sidebar-powerups">
                    <h3 class="sidebar-label">Power-ups</h3>
                    <button class="wood-btn small powerup-btn" id="btn-hint"
                        title="Hint: reveals one tile's correct spot" style="width: 100%; margin-bottom: 8px;">
                        <span style="display:flex; justify-content:space-between; align-items:center; width: 100%;">
                            <span>Hint</span>
                            <span class="powerup-count" id="hint-count"
                                style="background:rgba(0,0,0,0.3); padding:2px 6px; border-radius:12px;">3</span>
                        </span>
                    </button>
                    <button class="wood-btn small powerup-btn" id="btn-freeze" title="Freeze: pauses the timer for 30s"
                        style="width: 100%; margin-bottom: 8px;">
                        <span style="display:flex; justify-content:space-between; align-items:center; width: 100%;">
                            <span>Freeze</span>
                            <span class="powerup-count" id="freeze-count"
                                style="background:rgba(0,0,0,0.3); padding:2px 6px; border-radius:12px;">2</span>
                        </span>
                    </button>
                    <button class="wood-btn small powerup-btn powerup-autosolve" id="btn-autosolve"
                        title="Auto: solves the whole puzzle" style="width: 100%;">
                        <span style="display:flex; justify-content:space-between; align-items:center; width: 100%;">
                            <span>Solve</span>
                            <span class="powerup-count" id="autosolve-count"
                                style="background:rgba(0,0,0,0.3); padding:2px 6px; border-radius:12px;">1</span>
                        </span>
                    </button>
                </div>
            </aside>
        </div>

        <!-- Memorize Overlay -->
        <div id="memorize-overlay" class="hidden fullscreen-overlay">
            <h2 class="bubbly-text">MEMORIZE</h2>
        </div>

        <!-- Win Overlay -->
        <div id="win-overlay" class="hidden fullscreen-overlay">
            <canvas id="confetti-canvas" class="confetti-canvas"
                style="position: absolute; inset: 0; pointer-events: none; z-index: 10;"></canvas>
            <div class="win-modal wood-panel level-end-card">
                <div class="level-end-title-pill success"
                    style="background: var(--grass-main); color: white; padding: 4px 12px; border-radius: 12px; font-size: 14px; font-weight: 700; text-transform: uppercase;">
                    Level Complete</div>

                <h2 class="wood-text" style="margin-top: 12px; margin-bottom: 8px;">Awesome!</h2>

                <div class="stars stars-svg">
                    <svg class="icon-svg star-icon" viewBox="0 0 24 24" fill="var(--yellow-star)"
                        stroke="var(--wood-dark)" stroke-width="1.5" stroke-linejoin="round">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                        </polygon>
                    </svg>
                    <svg class="icon-svg star-icon" viewBox="0 0 24 24" fill="var(--yellow-star)"
                        stroke="var(--wood-dark)" stroke-width="1.5" stroke-linejoin="round">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                        </polygon>
                    </svg>
                    <svg class="icon-svg star-icon" viewBox="0 0 24 24" fill="var(--yellow-star)"
                        stroke="var(--wood-dark)" stroke-width="1.5" stroke-linejoin="round">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                        </polygon>
                    </svg>
                </div>

                <div class="stats-container" style="display: flex; gap: 16px; margin-bottom: 24px;">
                    <div class="stat-group wood-panel-small"
                        style="display: flex; flex-direction: column; align-items: center; padding: 8px 16px; background: rgba(0,0,0,0.2);">
                        <span class="stat-label">Score</span>
                        <span class="stat-value wood-text" id="win-moves">1,200</span>
                    </div>
                    <div class="coin-reward wood-panel-small"
                        style="display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(0,0,0,0.2);">
                        <svg class="icon-svg star-icon" viewBox="0 0 24 24" fill="var(--yellow-star)"
                            stroke="var(--wood-dark)" stroke-width="1.5" stroke-linejoin="round"
                            style="width: 24px; height: 24px;">
                            <polygon
                                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                            </polygon>
                        </svg>
                        <span class="wood-text" id="win-coins" style="font-size: 20px;">20</span>
                    </div>
                </div>

                <div class="level-end-actions" style="display: flex; gap: 12px; z-index: 100;">
                    <button id="next-level-btn" class="wood-btn large">NEXT</button>
                </div>
            </div>
        </div>
    </div>

    <!-- GSAP for smooth animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="images.js"></script>
    <script src="game.js"></script>
</body>

</html>
